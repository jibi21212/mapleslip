<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TaxKing AI — Connect Bank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: #a0a0b0; margin-bottom: 24px; font-size: 16px; }
        .status { color: #f1c40f; font-size: 14px; margin-top: 16px; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 16px; display: none; }
    </style>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
    <div class="container">
        <h1>TaxKing AI</h1>
        <p>Connecting to your bank securely via Plaid...</p>
        <div class="status" id="status">Initializing Plaid Link...</div>
        <div class="error" id="error"></div>
    </div>
    <script>
        const linkToken = "{{LINK_TOKEN}}";
        const statusEl = document.getElementById("status");
        const errorEl = document.getElementById("error");

        const handler = Plaid.create({
            token: linkToken,
            onSuccess: function(publicToken, metadata) {
                statusEl.textContent = "Bank connected! Redirecting...";
                window.location.href = "/callback?public_token=" + encodeURIComponent(publicToken);
            },
            onExit: function(err, metadata) {
                if (err) {
                    errorEl.style.display = "block";
                    errorEl.textContent = "Connection cancelled or failed: " + (err.display_message || err.error_message || "Unknown error");
                }
                statusEl.textContent = "You can close this tab or try again by refreshing.";
            },
            onLoad: function() {
                statusEl.textContent = "Plaid Link loaded. Opening...";
                handler.open();
            },
        });
    </script>
</body>
</html>
